<!DOCTYPE html>
<html lang="es">
<head>
    <title>Login</title>
</head>
<body>

    <h1 id="titulo"></h1>

    <div id="formulario"></div>

    <button onclick="ingresar()">Ingresar</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const tipo = params.get("tipo");
        console.log("Tipo recibido:", tipo);

        const titulo = document.getElementById("titulo");
        const form = document.getElementById("formulario");

        //INSTRUCTOR
        if (tipo === "instructor") {
            titulo.innerText = "Acceso Instructor";

            form.innerHTML = `
                <label>Contraseña:</label>
                <input type="password" id="password">
            `;
        }

        //CONSTANCIAS
        else if (tipo === "constancia") {
            titulo.innerText = "Acceso a Constancias";

            form.innerHTML = `
                <label>Clave de empleado:</label>
                <input type="text" inputmode="numeric" id="numero">
            `;
        }

        function ingresar() {

            if (tipo === "instructor") {

                let pass = document.getElementById("password").value;

                console.log("Enviando password:", pass);
                
                fetch("https://api-cursos-itq.onrender.com/api/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        password_acceso: pass
                    })
                })
                .then(response => response.json())
                .then(data => {
                    alert(JSON.stringify(data));
                    if (data.token) {
                        window.location.href = "instructor.html";
                    } else {
                        alert("Contraseña incorrecta");
                    }

                })
                .catch(error => {
                    console.error(error);
                });
            }

            if(tipo === "constancia"){
                let num = document.getElementById("numero").value;

                console.log("Enviando numero:", num);
                
                fetch("https://api-cursos-itq.onrender.com/api/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        password_acceso: num
                    })
                })
                .then(response => response.json())
                .then(data => {
                    alert(JSON.stringify(data));
                    if (data.token) {
                        window.location.href = "constancias.html";
                    } else {
                        alert("Clave incorrecta");
                    }

                })
                .catch(error => {
                    console.error(error);
                });
            }
        }
    </script>

</body>
</html>
