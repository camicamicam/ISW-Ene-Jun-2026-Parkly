<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Docly</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/styles.css">
    <link rel="icon" href="data:,"> <!--SOLO PARA QUE NO MUESTRE ESE ERROR-->
</head>
<body>
    <div id="navbar-container"></div>

    <main id="main-content"></main>

    <script type="module">
        import { renderNavbar } from './components/navbar.js';
        import { handleRoute } from './routes/router.js'; // IMPORTANTE: Importar handleRoute

        // Función de inicio
        const init = () => {
            renderNavbar(); // Ahora sí encontrará el contenedor
            handleRoute();  // Carga la página inicial
        };

        // Aseguramos que el DOM esté listo
        if (document.readyState === 'complete') {
            init();
        } else {
            window.addEventListener('DOMContentLoaded', init);
        }
    </script>
</body>
</html>
