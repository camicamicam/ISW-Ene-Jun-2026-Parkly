<!DOCTYPE html>
<html lang="es">
<head>
    <title id="tituloP"></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2c3e50;
            padding: 10px 20px;
        }

        .logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .menu {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .menu li {
            position: relative;
        }

        .menu li a {
            display: block;
            padding: 10px 15px;
            color: white;
            text-decoration: none;
        }

        .menu li a:hover {
            background-color: #34495e;
        }

        .submenu {
            display: none;
            position: absolute;
            top: 40px;
            right: 0;
            background-color: #2c3e50;
            list-style: none;
            padding: 0;
            min-width: 200px;
        }

        .submenu li a {
            padding: 10px;
        }

        /* LOGIN CARD */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .card h1 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* BOTÓN OCULTO EN DESKTOP */
        .menu-toggle {
            display: none;
            font-size: 25px;
            color: white;
            cursor: pointer;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {

            .menu {
                display: none;
                flex-direction: column;
                width: 100%;
                background-color: #2c3e50;
                position: absolute;
                top: 60px;
                left: 0;
            }

            .menu.active {
                display: flex;
            }

            .menu li {
                text-align: center;
            }

            .menu-toggle {
                display: block;
            }

            .navbar {
                position: relative;
            }

            /* submenu móvil */
            .submenu {
                position: static;
                display: none;
            }

            .dropdown.active .submenu {
                display: block;
            }

            /* login */
            .card {
                width: 90%;
                padding: 20px;
            }

            .container {
                height: auto;
                margin-top: 40px;
                padding: 20px;
            }
        }

        .dropdown > a::after {
            content: " ▼";
            font-size: 12px;
        }

        /* Para escritorio */
        @media (min-width: 769px) {
            .dropdown:hover .submenu {
                display: block;
            }
        }

        * {
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">
            Docly
        </div>
        <div class="menu-toggle" onclick="toggleMenu()">
            ☰
        </div>
        <ul class="menu">
            <li class="dropdown">
                <a href="#">Cursos de actualización profesional</a>
                <ul class="submenu">
                    <li><a href="perfil-docente.html">Docente</a></li>
                    <li><a href="perfil-administrativo.html">Administrativo</a></li>
                    <li><a href="login.html?tipo=instructor">Instructor</a></li>
                </ul>
            </li>

            <li class="dropdown">
                <a href="#">Cursos de actualización docente</a>
                <ul class="submenu">
                    <li><a href="perfil-docente.html">Docente</a></li>
                    <li><a href="perfil-administrativo.html">Administrativo</a></li>
                    <li><a href="login.html?tipo=instructor">Instructor</a></li>
                </ul>
            </li>

            <li>
                <a href="login.html?tipo=constancia">Constancias de cursos</a>
            </li>
        </ul>
    </nav>

    <!-- LOGIN -->
    <div class="container">
        <div class="card">
            <h1 id="titulo"></h1>
            <div id="formulario"></div>
            <button onclick="ingresar()">Ingresar</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const tipo = params.get("tipo");

        const titulo = document.getElementById("titulo");
        const tituloP = document.getElementById("tituloP");
        const form = document.getElementById("formulario");

        //INSTRUCTOR
        if (tipo === "instructor") {
            titulo.innerText = "Acceso Instructor";
            tituloP.innerText = "Login Instructor";

            form.innerHTML = `
                <input type="password" id="password" placeholder="Ingrese Clave:">
            `;
        }

        //CONSTANCIAS
        else if (tipo === "constancia") {
            titulo.innerText = "Acceso a Constancias";
            tituloP.innerText = "Login Constancias";

            form.innerHTML = `
                <input type="password" inputmode="numeric" id="numero" placeholder="Ingrese clave:">
            `;
        }

        function ingresar() {

            if (tipo === "instructor") {

                let pass = document.getElementById("password").value.trim();
                
                fetch("https://api-cursos-itq.onrender.com/api/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        password_acceso: pass
                    })
                })
                .then(response => response.json())
                .then(data => {
                    //alert(JSON.stringify(data));
                    if (data.token) {
                        window.location.href = "instructor.html";
                    } else {
                        alert(data.mensaje || "Error en login");
                    }

                })
                .catch(error => {
                    console.error(error);
                });
            }

            if(tipo === "constancia"){
                let num = document.getElementById("numero").value.trim();

                console.log("Enviando numero:", num);
                
                fetch("https://api-cursos-itq.onrender.com/api/auth/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        password_acceso: num
                    })
                })
                .then(response => response.json())
                .then(data => {
                    //alert(JSON.stringify(data));
                    if (data.token) {
                        window.location.href = "constancias.html";
                    } else {
                        alert(data.mensaje || "Error en login");
                    }

                })
                .catch(error => {
                    console.error(error);
                });
            }
        }

        function toggleMenu() {
            document.querySelector(".menu").classList.toggle("active");
        }

        document.querySelectorAll(".dropdown > a").forEach(item => {
            item.addEventListener("click", function(e) {
                if (window.innerWidth <= 768) {
                    e.preventDefault(); // evita redirección
                    let parent = this.parentElement;

                    // cerrar otros menús abiertos
                    document.querySelectorAll(".dropdown").forEach(d => {
                        if (d !== parent) d.classList.remove("active");
                    });

                    parent.classList.toggle("active");
                }
            });
        });
    </script>

</body>
</html>
